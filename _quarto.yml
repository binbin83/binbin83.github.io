project:
  type: website
  output-dir: docs

website:
  title: "Robin Quillivic"
  description: "Post-doctoral researcher in Clinical Decision Support Systems and Natural Language Processing for mental health"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: publications.qmd
        text: Publications
      - href: projects.qmd
        text: Projects
      - href: contact.qmd
        text: Contact
    right:
      - icon: github
        href: https://github.com/binbin83
      - icon: envelope
        href: mailto:robin.quillivic@cnrs.fr
      - text: "ORCID"
        href: https://orcid.org/0009-0009-9372-0173

  page-footer:
    left: "© 2025 Robin Quillivic. All rights reserved."
    right: "Built with [Quarto](https://quarto.org/)"

format:
  html:
    theme: [cosmo, custom.scss]
    toc: true
    toc-location: right
    link-external-newwindow: true
    link-external-icon: true
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    anchor-sections: true
    citations-hover: true
    footnotes-hover: true
    highlight-style: github
    html-math-method: katex
    include-in-header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
